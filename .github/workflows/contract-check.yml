name: API contract check

on:
  pull_request:
    branches: [main]


permissions:
  contents: read
  pull_requests: write

jobs:
  contract-diff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr-branch
          fetch-depth: 0

      - name: Checkout Base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base-branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pr-branch/requirements.txt
        
      - name: Install Dependencies
        run: pip install -r pr-branch/requirements.txt

      - name: Start base app and fetch its schema
        working-directory: base-branch
        run: |
          uvicorn app.main:app --port 8001 &
          echo "Waiting for base app..."
          for i in {1..10}; do
            curl -sf http://localhost:8001/health && break
            sleep 1
          done
          python tools/fetch_schema.py http://localhost:8001/openapi.json ../old_schema.json

      - name: Start PR app and fetch its schema
        working-directory: pr-branch
        run: |
          uvicorn app.main:app --port 8002 &
          echo "Waiting for PR app..."
          for i in {1..10}; do
            curl -sf http://localhost:8002/health && break
            sleep 1
          done
          python tools/fetch_schema.py http://localhost:8002/openapi.json ../new_schema.json

      - name: Run schema diff
        id: diff
        working-directory: pr-branch
        continue-on-error: true
        run: |
          python tools/diff_schema.py ../old_schema.json ../new_schema.json
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE
      
      - name: Read diff report
        id: report
        run: |
          {
            echo "content<<EOF"
            cat pr-branch/diff_report.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.report.outputs.content }}`;
            const {data:comments}=await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = "<!-- contract-guardian-report -->";
            const existing = comments.find(c => c.body.includes(marker));
            const finalBody = `${marker}\n${body}`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: finalBody,
              });
            }
            
      - name: Check for breaking-change override label
        id: label-check
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            return labels.includes("breaking-change");
          result-encoding: string

      - name: Fail if breaking changes without override
        if: steps.diff.outputs.exit_code == '1' && steps.label-check.outputs.result != 'true'
        run: |
          echo "Breaking changes detected and PR is not labeled 'breaking-change'."
          echo "Either fix the changes or add the 'breaking-change' label to acknowledge them."
          exit 1





      



